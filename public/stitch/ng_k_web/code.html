<header class="fixed top-0 left-0 right-0 z-50 glass-panel">
<div class="flex justify-between items-center w-full px-8 py-4 max-w-7xl mx-auto">

<a class="bg-primary text-on-primary px-6 py-2 rounded-xl font-bold active:scale-95 transition-transform" href="#">Đăng nhập</a>

<div class="bg-surface-container-low h-[1px] w-full"></div>

<main class="flex-grow pt-32 pb-16 px-4 flex items-center justify-center relative overflow-hidden">
<div class="absolute top-[-10%] left-[-5%] w-96 h-96 bg-primary opacity-5 rounded-full blur-3xl"></div>

<div class="w-full max-w-lg glass-panel p-10 rounded-[2rem] ambient-shadow relative z-10">
<div class="text-center mb-10">
<h1 class="font-headline text-4xl font-extrabold text-on-surface tracking-tight mb-2">Bắt đầu hành trình</h1>

<div class="flex flex-col items-center mb-8">

<div class="w-24 h-24 rounded-full bg-surface-container-highest flex items-center justify-center overflow-hidden border-4 border-surface-container-lowest ambient-shadow transition-transform group-hover:scale-105">
<span class="material-symbols-outlined text-4xl text-on-surface-variant">add_a_photo</span>
</div>
<button class="absolute bottom-0 right-0 bg-primary text-white p-2 rounded-full shadow-lg active:scale-90 transition-transform" type="button">
<span class="material-symbols-outlined text-sm">edit</span>
</button>
</div>
<label class="mt-3 text-sm font-medium text-primary cursor-pointer">Tải ảnh đại diện</label>
</div>
<div class="space-y-4">
<div class="space-y-1.5">
<label class="text-sm font-semibold text-on-surface-variant ml-1">Tên đăng nhập</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant">person</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-highest border-none rounded-xl focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all placeholder:text-outline" placeholder="Nhập tên người dùng" type="text"/>
</div>
</div>
<div class="space-y-1.5">
<label class="text-sm font-semibold text-on-surface-variant ml-1">Mật khẩu</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant">lock</span>
<input class="w-full pl-12 pr-12 py-4 bg-surface-container-highest border-none rounded-xl focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all placeholder:text-outline" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</div>
<div class="space-y-1.5">
<label class="text-sm font-semibold text-on-surface-variant ml-1">Xác nhận mật khẩu</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant">lock_reset</span>
<input class="w-full pl-12 pr-12 py-4 bg-surface-container-highest border-none rounded-xl focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all placeholder:text-outline" placeholder="••••••••" type="password"/>
</div>
</div>
</div>
<button class="w-full py-4 bg-gradient-to-br from-primary to-primary-dim text-on-primary font-bold text-lg rounded-xl shadow-lg shadow-primary/20 hover:opacity-90 active:scale-[0.98] transition-all mt-4" type="submit">
                    Tạo tài khoản
                </button>
<div class="relative py-4">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/30"></div>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-surface-container-lowest px-4 text-on-surface-variant font-medium">Hoặc đăng ký bằng</span>
</div>

<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-3 py-3 px-4 bg-surface-container-lowest border border-outline-variant/20 rounded-xl font-semibold text-on-surface hover:bg-surface-container-low transition-colors active:scale-95" type="button">

<img alt="Facebook Logo" class="w-5 h-5" data-alt="Official Facebook logo in high quality blue circular icon representing global social connectivity" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAXivHdVKevSkmMSc6AH8CX5TQ8iaURWEgp_IIkDx6ingpD7DSikB39SXynRu1ijkvNpp7pNQ8NNFVJML1Lolvgr3kmGq9aiRXphaH_nFJNcP_7MEqCWy5Zrl8Z9Z4up8nexnT9wByo41VjEnTwW2All8h7P0h-vuST5Iwasquke8koE-BqtreAehh-fDuwaRaiQG9tvQKUd-n9Rt9m96RPIPsmqmDiP4J8U-DB9rL1Nem_JA4LIt7H4GvgoV11dEDHb69PAPRYcG8"/>
