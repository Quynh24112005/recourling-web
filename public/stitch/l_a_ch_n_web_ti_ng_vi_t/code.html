<!DOCTYPE html>

<html class="light" lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Be+Vietnam+Pro:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#a400a4",
              "primary-fixed": "#fc5ff5",
              "surface-container": "#e8e9e3",
              "outline": "#767773",
              "surface-tint": "#a400a4",
              "tertiary": "#3d6600",
              "outline-variant": "#adada9",
              "surface-variant": "#dcddd7",
              "on-tertiary-fixed": "#2c4b00",
              "primary-dim": "#900090",
              "secondary": "#6a1cf6",
              "on-secondary-fixed-variant": "#5e00e6",
              "surface-container-high": "#e2e3dd",
              "background": "#f7f7f2",
              "on-surface": "#2d2f2c",
              "secondary-container": "#d9caff",
              "on-primary-fixed": "#000000",
              "on-tertiary": "#d9ffaa",
              "tertiary-container": "#b5fd5e",
              "on-secondary-fixed": "#3e009d",
              "inverse-on-surface": "#9c9d99",
              "tertiary-fixed": "#b5fd5e",
              "on-secondary-container": "#5400ce",
              "error": "#b41340",
              "tertiary-fixed-dim": "#a7ee51",
              "secondary-fixed-dim": "#ccb9ff",
              "on-error-container": "#510017",
              "primary-container": "#fc5ff5",
              "primary-fixed-dim": "#ec50e6",
              "on-tertiary-fixed-variant": "#406a00",
              "inverse-primary": "#fc5ff5",
              "secondary-dim": "#5d00e3",
              "on-primary-fixed-variant": "#540054",
              "tertiary-dim": "#355900",
              "on-error": "#ffefef",
              "secondary-fixed": "#d9caff",
              "on-secondary": "#f7f0ff",
              "inverse-surface": "#0d0f0c",
              "on-background": "#2d2f2c",
              "on-tertiary-container": "#395f00",
              "surface-container-low": "#f1f1ec",
              "surface-bright": "#f7f7f2",
              "on-primary": "#ffeef8",
              "surface-dim": "#d3d5cf",
              "surface-container-highest": "#dcddd7",
              "on-primary-container": "#440044",
              "error-dim": "#a70138",
              "error-container": "#f74b6d",
              "surface-container-lowest": "#ffffff",
              "surface": "#f7f7f2",
              "on-surface-variant": "#5a5c58"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Be Vietnam Pro"],
              "label": ["Be Vietnam Pro"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #f7f7f2;
            color: #2d2f2c;
            font-family: 'Be Vietnam Pro', sans-serif;
        }
        .glass-nav {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
        }
    </style>
</head>
<body class="flex min-h-screen">
<!-- SideNavBar (Hidden on Mobile) -->
<aside class="hidden md:flex h-screen w-64 fixed left-0 top-0 bg-[#f7f7f2] dark:bg-stone-900 flex-col gap-2 p-4 z-40">
<div class="mb-8 px-4 py-2">
<span class="text-2xl font-black text-[#a400a4] tracking-tight font-headline">Linguist Pro</span>
</div>
<nav class="flex flex-col gap-2 h-full">
<a class="flex items-center gap-3 px-4 py-3 bg-[#dcddd7] dark:bg-stone-800 text-[#a400a4] rounded-xl font-bold transition-all duration-300" href="#">
<span class="material-symbols-outlined" data-icon="menu_book">menu_book</span>
<span class="font-label">Bài học</span>
</a>
<a class="flex items-center gap-3 px-4 py-3 text-[#2d2f2c] dark:text-stone-400 hover:translate-x-1 transition-all duration-300 rounded-xl" href="#">
<span class="material-symbols-outlined" data-icon="local_library">local_library</span>
<span class="font-label">Thư viện</span>
</a>
<a class="flex items-center gap-3 px-4 py-3 text-[#2d2f2c] dark:text-stone-400 hover:translate-x-1 transition-all duration-300 rounded-xl" href="#">
<span class="material-symbols-outlined" data-icon="group">group</span>
<span class="font-label">Cộng đồng</span>
</a>
<a class="flex items-center gap-3 px-4 py-3 text-[#2d2f2c] dark:text-stone-400 hover:translate-x-1 transition-all duration-300 rounded-xl" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-label">Hồ sơ</span>
</a>
<div class="mt-auto p-4 bg-surface-container-low rounded-2xl">
<div class="flex items-center gap-3 mb-3">
<img alt="User Avatar" class="w-10 h-10 rounded-full" data-alt="close-up portrait of a friendly digital avatar with modern aesthetic" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBsnBmifNMC8yP_ubw5z4huJh8TgmyPgRn_ll8lqtEUKknmu9YkNRwz9wOku-aK1deD337GfaXppVKy9umI_xQKEU3lZhpYNaBdKoR2RqFkd9zWIoVt7enYmke336sK_OdfUr5F6D39GbfZXzcto6MghNn5JMdIerM4w6BAZPEwnlfDIrUBr1_WADLsAQfuKg9STg8i27Ui45-lTzhf4tw2m4GBrRK18-8bReGz25ubvVRcgcY9yLQD6G5kx8fRzg3bEEc5tKder5g"/>
<div>
<p class="text-sm font-bold font-headline">Người học</p>
<p class="text-xs text-on-surface-variant">Cấp độ 12</p>
</div>
</div>
<button class="w-full py-2 bg-primary text-on-primary rounded-xl font-bold text-sm active:scale-95 transition-transform">
                    Nâng cấp Pro
                </button>
</div>
</nav>
</aside>
<!-- Main Content Canvas -->
<main class="flex-1 md:ml-64 min-h-screen flex flex-col items-center">
<!-- Top Navigation Area / Progress -->
<header class="w-full max-w-4xl px-6 pt-10 pb-6 flex items-center gap-6">
<button class="p-2 hover:bg-surface-container-highest rounded-full transition-colors active:scale-90">
<span class="material-symbols-outlined text-on-surface" data-icon="close">close</span>
</button>
<div class="flex-1 h-3 bg-surface-container rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full w-[65%] transition-all duration-1000"></div>
</div>
<div class="flex items-center gap-2 text-primary font-bold">
<span class="material-symbols-outlined" data-icon="favorite" style="font-variation-settings: 'FILL' 1;">favorite</span>
<span>5</span>
</div>
</header>
<!-- Learning Card Container -->
<section class="w-full max-w-2xl px-6 py-8 flex flex-col items-center">
<!-- Question Header -->
<div class="w-full mb-8 text-left">
<h1 class="text-2xl md:text-3xl font-headline font-extrabold text-on-surface tracking-tight mb-2">
                    Lựa chọn đáp án đúng
                </h1>
<p class="text-on-surface-variant font-body">Dựa vào hình ảnh để trả lời câu hỏi sau.</p>
</div>
<!-- Image Content with Tonal Layering -->
<div class="w-full aspect-[16/9] rounded-[2rem] bg-surface-container-low p-4 mb-10 overflow-hidden shadow-sm shadow-stone-200/50">
<div class="w-full h-full rounded-[1.5rem] overflow-hidden relative">
<img alt="Căn phòng ấm cúng" class="w-full h-full object-cover" data-alt="a cozy sunlit living room with a grand piano by a window, warm wooden floors, and soft indoor plants" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAfG9JGBk8AIQkLlJ_1LTcu-GoqEMoWlMRtk7q37nJlPaMlm2dpMCZT2eedNdcFrsGg1uY9f8Ri62EsmsWlf8x4dbhOlGsXI_DlL3gjo5OGA_ltmtyJL6FjbpCxqYDgfatCOjL3xc59ienXuCJQlNDPdR33PNl10qTjfR02DJhiAxhCa-5w3CwCmsVAl6UYWK9mz2KY2lRqk6sw6wmAj2x25cJ9Td1S-o7pyhQ0dZvBAoX74W-xnawbv8t7a1WBj922PBhyMDfamAc"/>
<div class="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent"></div>
</div>
</div>
<!-- Question Prompt -->
<div class="bg-surface-container-highest px-8 py-5 rounded-2xl mb-12 shadow-sm border-l-4 border-primary">
<p class="text-xl md:text-2xl font-body font-semibold text-on-surface leading-relaxed">
                    "Căn phòng có piano đúng ko ?"
                </p>
</div>
<!-- Interaction Buttons - Asymmetric Layout -->
<div class="w-full grid grid-cols-1 md:grid-cols-2 gap-4">
<!-- Correct Option -->
<button class="group relative flex flex-col items-center justify-center p-8 bg-surface-container-lowest border-2 border-transparent hover:border-tertiary rounded-[2rem] transition-all duration-300 shadow-xl shadow-stone-200/20 active:scale-95">
<div class="w-16 h-16 rounded-full bg-tertiary/10 flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-tertiary text-4xl" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<span class="text-xl font-headline font-extrabold text-tertiary tracking-widest">ĐÚNG</span>
<div class="absolute -top-2 -right-2 bg-tertiary text-white text-[10px] px-2 py-1 rounded-full opacity-0 group-hover:opacity-100 transition-opacity font-bold">Lựa chọn 1</div>
</button>
<!-- Incorrect Option -->
<button class="group relative flex flex-col items-center justify-center p-8 bg-surface-container-lowest border-2 border-transparent hover:border-error rounded-[2rem] transition-all duration-300 shadow-xl shadow-stone-200/20 active:scale-95">
<div class="w-16 h-16 rounded-full bg-error/10 flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-error text-4xl" data-icon="cancel" style="font-variation-settings: 'FILL' 1;">cancel</span>
</div>
<span class="text-xl font-headline font-extrabold text-error tracking-widest">SAI</span>
<div class="absolute -top-2 -right-2 bg-error text-white text-[10px] px-2 py-1 rounded-full opacity-0 group-hover:opacity-100 transition-opacity font-bold">Lựa chọn 2</div>
</button>
</div>
</section>
<!-- Fixed Footer Action with Glassmorphism -->
<footer class="fixed bottom-0 left-0 md:left-64 right-0 p-6 glass-nav z-30">
<div class="max-w-4xl mx-auto flex justify-between items-center">
<button class="px-6 py-3 text-on-surface font-bold font-label hover:bg-surface-container-high rounded-xl transition-colors active:scale-95">
                    BỎ QUA
                </button>
<button class="px-12 py-4 bg-primary bg-gradient-to-br from-primary to-primary-dim text-on-primary font-headline font-extrabold rounded-2xl shadow-lg shadow-primary/20 active:scale-95 transition-all">
                    TIẾP TỤC
                </button>
</div>
</footer>
</main>
<!-- Mobile Navigation (Only visible on small screens) -->
<nav class="md:hidden fixed bottom-0 left-0 right-0 h-16 bg-surface-container-lowest flex items-center justify-around z-50 border-t border-outline-variant/10">
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined" data-icon="menu_book" style="font-variation-settings: 'FILL' 1;">menu_book</span>
<span class="text-[10px] font-bold">Bài học</span>
</a>
<a class="flex flex-col items-center gap-1 text-on-surface-variant" href="#">
<span class="material-symbols-outlined" data-icon="local_library">local_library</span>
<span class="text-[10px]">Thư viện</span>
</a>
<a class="flex flex-col items-center gap-1 text-on-surface-variant" href="#">
<span class="material-symbols-outlined" data-icon="group">group</span>
<span class="text-[10px]">Cộng đồng</span>
</a>
<a class="flex flex-col items-center gap-1 text-on-surface-variant" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="text-[10px]">Hồ sơ</span>
</a>
</nav>
</body></html>
