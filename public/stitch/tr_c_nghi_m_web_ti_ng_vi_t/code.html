<!DOCTYPE html>

<html class="light" lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Linguist Pro - Trắc nghiệm</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Be+Vietnam+Pro:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#a400a4",
              "primary-fixed": "#fc5ff5",
              "surface-container": "#e8e9e3",
              "outline": "#767773",
              "surface-tint": "#a400a4",
              "tertiary": "#3d6600",
              "outline-variant": "#adada9",
              "surface-variant": "#dcddd7",
              "on-tertiary-fixed": "#2c4b00",
              "primary-dim": "#900090",
              "secondary": "#6a1cf6",
              "on-secondary-fixed-variant": "#5e00e6",
              "surface-container-high": "#e2e3dd",
              "background": "#f7f7f2",
              "on-surface": "#2d2f2c",
              "secondary-container": "#d9caff",
              "on-primary-fixed": "#000000",
              "on-tertiary": "#d9ffaa",
              "tertiary-container": "#b5fd5e",
              "on-secondary-fixed": "#3e009d",
              "inverse-on-surface": "#9c9d99",
              "tertiary-fixed": "#b5fd5e",
              "on-secondary-container": "#5400ce",
              "error": "#b41340",
              "tertiary-fixed-dim": "#a7ee51",
              "secondary-fixed-dim": "#ccb9ff",
              "on-error-container": "#510017",
              "primary-container": "#fc5ff5",
              "primary-fixed-dim": "#ec50e6",
              "on-tertiary-fixed-variant": "#406a00",
              "inverse-primary": "#fc5ff5",
              "secondary-dim": "#5d00e3",
              "on-primary-fixed-variant": "#540054",
              "tertiary-dim": "#355900",
              "on-error": "#ffefef",
              "secondary-fixed": "#d9caff",
              "on-secondary": "#f7f0ff",
              "inverse-surface": "#0d0f0c",
              "on-background": "#2d2f2c",
              "on-tertiary-container": "#395f00",
              "surface-container-low": "#f1f1ec",
              "surface-bright": "#f7f7f2",
              "on-primary": "#ffeef8",
              "surface-dim": "#d3d5cf",
              "surface-container-highest": "#dcddd7",
              "on-primary-container": "#440044",
              "error-dim": "#a70138",
              "error-container": "#f74b6d",
              "surface-container-lowest": "#ffffff",
              "surface": "#f7f7f2",
              "on-surface-variant": "#5a5c58"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Be Vietnam Pro"],
              "label": ["Be Vietnam Pro"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        body { font-family: 'Be Vietnam Pro', sans-serif; }
        .font-headline { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background text-on-surface">
<!-- SideNavBar (Authority Source: JSON & Design System) -->
<aside class="hidden md:flex h-screen w-64 fixed left-0 top-0 bg-[#f7f7f2] dark:bg-stone-900 border-r-0 flex-col gap-2 p-4 z-40">
<div class="mb-8 px-4 py-2">
<span class="text-2xl font-black text-[#a400a4] tracking-tight font-headline">Linguist Pro</span>
</div>
<nav class="flex flex-col gap-2">
<!-- Active Navigation: Bài học -->
<a class="flex items-center gap-3 px-4 py-3 bg-[#dcddd7] dark:bg-stone-800 text-[#a400a4] rounded-xl font-bold transition-all duration-300" href="#">
<span class="material-symbols-outlined" data-icon="menu_book">menu_book</span>
<span class="font-label">Bài học</span>
</a>
<a class="flex items-center gap-3 px-4 py-3 text-[#2d2f2c] dark:text-stone-400 hover:translate-x-1 transition-all duration-300" href="#">
<span class="material-symbols-outlined" data-icon="local_library">local_library</span>
<span class="font-label">Thư viện</span>
</a>
<a class="flex items-center gap-3 px-4 py-3 text-[#2d2f2c] dark:text-stone-400 hover:translate-x-1 transition-all duration-300" href="#">
<span class="material-symbols-outlined" data-icon="group">group</span>
<span class="font-label">Cộng đồng</span>
</a>
<a class="flex items-center gap-3 px-4 py-3 text-[#2d2f2c] dark:text-stone-400 hover:translate-x-1 transition-all duration-300" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-label">Hồ sơ</span>
</a>
</nav>
<div class="mt-auto p-4 bg-surface-container-low rounded-xl">
<p class="text-xs text-on-surface-variant mb-1 font-label">Chào mừng, Người học</p>
<p class="text-xs font-bold text-primary mb-3">Cấp độ 12 - Chuyên gia</p>
<button class="w-full py-2 bg-primary text-on-primary rounded-lg text-sm font-bold shadow-sm active:scale-95 transition-transform">
                Nâng cấp Pro
            </button>
</div>
</aside>
<!-- Main Content Canvas -->
<main class="md:ml-64 min-h-screen flex flex-col items-center">
<!-- Top Navigation / Progress Shell -->
<header class="w-full max-w-5xl px-6 pt-10 pb-6 flex items-center gap-6">
<button class="p-2 rounded-full hover:bg-surface-variant transition-colors active:scale-90">
<span class="material-symbols-outlined text-outline">close</span>
</button>
<div class="flex-grow h-3 bg-surface-container rounded-full overflow-hidden">
<div class="h-full w-[65%] bg-primary rounded-full transition-all duration-500 shadow-[0_0_12px_rgba(164,0,164,0.3)]"></div>
</div>
<div class="flex items-center gap-2 text-primary font-bold">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">favorite</span>
<span class="font-headline text-lg">5</span>
</div>
</header>
<!-- Question Section -->
<section class="w-full max-w-4xl px-6 py-8 flex flex-col flex-grow">
<div class="mb-12">
<h1 class="text-3xl font-extrabold font-headline text-on-surface mb-2 tracking-tight">Trắc nghiệm</h1>
<p class="text-on-surface-variant text-lg font-body opacity-80">Chọn nghĩa đúng cho từ vựng sau đây:</p>
</div>
<!-- Bento-style Question Card -->
<div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-center mb-16">
<div class="lg:col-span-5 flex justify-center">
<div class="relative group">
<div class="absolute inset-0 bg-primary opacity-5 blur-3xl group-hover:opacity-10 transition-opacity"></div>
<img alt="Learning Illustration" class="w-64 h-64 object-cover rounded-[2.5rem] shadow-xl relative z-10 border-4 border-surface-container-lowest" data-alt="whimsical 3d illustration of a glowing open book with floating magical particles and soft purple ambient lighting on a clean studio background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBM5Vc_FbvHht0ywglj-kwVkYLhYMC577y9WhzQLfJqeROCa4mf0JAp_78bJFCQV-2IOvnWQWJGWYncTb9JXKbuNY2SrEQgnq1rZq7WmCW14IwL9lDxcfGMbJHm0tFX54tpgR25JjYTO0zp86_KfXDI1UbMWEbdDVydrFXT2dKd8VPc4UJtHQ6iuu0AH4VmEzwMSOaU-AynFGRzvLWAxf5Ay6GzsM26zkCrvFLVBpNGyQmvVxPnkxLU4ftbE1m4m1-JKAkiG0YDKdE"/>
</div>
</div>
<div class="lg:col-span-7">
<div class="bg-surface-container-lowest p-8 rounded-[2rem] shadow-[rgba(45,47,44,0.06)_0px_4px_16px] border border-outline-variant/10">
<span class="inline-block px-3 py-1 bg-secondary-container text-on-secondary-container text-xs font-bold rounded-full mb-4 font-headline uppercase tracking-wider">Từ vựng mới</span>
<h2 class="text-5xl font-extrabold font-headline text-primary mb-4 leading-tight">Serendipity</h2>
<div class="flex items-center gap-3 text-on-surface-variant">
<span class="material-symbols-outlined text-primary cursor-pointer hover:scale-110 transition-transform">volume_up</span>
<p class="italic text-lg font-body">/ˌserənˈdipədē/</p>
</div>
</div>
</div>
</div>
<!-- Options Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-12">
<!-- Option 1: Selected/Active state simulation -->
<button class="group flex items-center p-6 bg-surface-container-lowest border-2 border-primary rounded-2xl text-left transition-all duration-200 active:scale-98 shadow-sm">
<span class="flex items-center justify-center w-12 h-12 bg-primary text-on-primary font-headline font-bold text-xl rounded-xl mr-4">1</span>
<div>
<p class="font-headline font-bold text-on-surface text-lg">Sự tình cờ may mắn</p>
<p class="text-on-surface-variant text-sm font-body opacity-70">An occurrence of events by chance in a happy way.</p>
</div>
<span class="material-symbols-outlined ml-auto text-primary" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</button>
<!-- Option 2 -->
<button class="group flex items-center p-6 bg-surface-container-lowest border border-outline-variant/20 rounded-2xl text-left transition-all duration-300 hover:bg-surface-container-low active:scale-98 shadow-[rgba(45,47,44,0.04)_0px_4px_8px]">
<span class="flex items-center justify-center w-12 h-12 bg-surface-variant text-on-surface-variant font-headline font-bold text-xl rounded-xl mr-4 group-hover:bg-primary/10 group-hover:text-primary transition-colors">2</span>
<div>
<p class="font-headline font-bold text-on-surface text-lg">Nỗi buồn vô cớ</p>
<p class="text-on-surface-variant text-sm font-body opacity-70">A state of being sad without any particular reason.</p>
</div>
</button>
<!-- Option 3 -->
<button class="group flex items-center p-6 bg-surface-container-lowest border border-outline-variant/20 rounded-2xl text-left transition-all duration-300 hover:bg-surface-container-low active:scale-98 shadow-[rgba(45,47,44,0.04)_0px_4px_8px]">
<span class="flex items-center justify-center w-12 h-12 bg-surface-variant text-on-surface-variant font-headline font-bold text-xl rounded-xl mr-4 group-hover:bg-primary/10 group-hover:text-primary transition-colors">3</span>
<div>
<p class="font-headline font-bold text-on-surface text-lg">Sự kiên trì bền bỉ</p>
<p class="text-on-surface-variant text-sm font-body opacity-70">Determination to keep doing something despite difficulties.</p>
</div>
</button>
<!-- Option 4 -->
<button class="group flex items-center p-6 bg-surface-container-lowest border border-outline-variant/20 rounded-2xl text-left transition-all duration-300 hover:bg-surface-container-low active:scale-98 shadow-[rgba(45,47,44,0.04)_0px_4px_8px]">
<span class="flex items-center justify-center w-12 h-12 bg-surface-variant text-on-surface-variant font-headline font-bold text-xl rounded-xl mr-4 group-hover:bg-primary/10 group-hover:text-primary transition-colors">4</span>
<div>
<p class="font-headline font-bold text-on-surface text-lg">Lòng dũng cảm</p>
<p class="text-on-surface-variant text-sm font-body opacity-70">The ability to do something that frightens one.</p>
</div>
</button>
</div>
</section>
<!-- Fixed Footer Action Bar -->
<footer class="w-full bg-surface-container-lowest/80 backdrop-blur-md sticky bottom-0 border-t-0 p-6 flex justify-center z-30">
<div class="w-full max-w-5xl flex justify-between items-center">
<button class="px-8 py-3 rounded-xl border border-outline-variant/30 font-bold text-on-surface-variant hover:bg-surface-variant transition-colors font-headline active:scale-95">
                    Bỏ qua
                </button>
<button class="px-12 py-4 rounded-xl bg-gradient-to-br from-primary to-primary-dim text-on-primary font-extrabold font-headline shadow-lg shadow-primary/20 hover:shadow-primary/40 active:scale-95 transition-all flex items-center gap-2">
                    Tiếp theo
                    <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</footer>
</main>
<!-- Decorative Elements (Design System Overlap Rule) -->
<div class="fixed top-20 right-[-10%] w-[30%] h-[30%] bg-secondary opacity-[0.03] blur-[100px] rounded-full pointer-events-none -z-10"></div>
<div class="fixed bottom-[-10%] left-[20%] w-[40%] h-[40%] bg-primary opacity-[0.04] blur-[120px] rounded-full pointer-events-none -z-10"></div>
</body></html>
